<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New York Grill - نظام التبريد</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Tahoma, Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#8B0000;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.menu{
    cursor:pointer;
}

.menu div{
    width:30px;
    height:4px;
    background:white;
    margin:5px 0;
    border-radius:3px;
}

.brand{
    display:flex;
    align-items:center;
    gap:10px;
}

.brand img{
    width:45px;
    height:45px;
    border-radius:8px;
    object-fit:cover;
}

.container{
    max-width:900px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:12px;
}

h2{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#8B0000;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#a00000;
}

.sidebar{
    position:fixed;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:white;
    overflow:auto;
    transition:0.3s;
    padding:20px;
    z-index:999;
}

.sidebar.active{
    left:0;
}

.card{
    background:#f8f8f8;
    padding:15px;
    margin:10px 0;
    border-right:5px solid #8B0000;
    border-radius:10px;
}

#message{
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>

<div class="menu" onclick="toggleSidebar()">
    <div></div>
    <div></div>
    <div></div>
</div>

<div class="brand">
    <img src="WhatsApp Image 2026-01-28 at 11.59.19 PM.jpeg" alt="Logo">
    <strong>New York Grill</strong>
</div>

</header>

<div class="container">

<h2>إدخال بيانات الطعام</h2>

<input
    type="text"
    id="worker"
    placeholder="اسم الموظف">

<input
    type="text"
    id="container"
    inputmode="numeric"
    placeholder="رقم الحاوية (1،2،3...)">

<input
    type="text"
    id="food"
    placeholder="نوع الطعام">

<input
    type="date"
    id="refrigerationDate">

<h3>الإعدام (اختياري)</h3>

<input
    type="text"
    id="executioner"
    placeholder="اسم منفذ الإعدام">

<input
    type="date"
    id="executionDate">

<button onclick="submitData()">
    إدخال
</button>

</div>

<div class="sidebar" id="sidebar">

<h2>Admin Login</h2>

<input
    type="password"
    id="password"
    placeholder="Password">

<button onclick="login()">
    Login
</button>

<div id="message"></div>

<br>

<button onclick="exportCSV()">
    Download CSV
</button>

<hr>

<div id="inbox"></div>

</div>

<script>

const admins = [
    "aziz-123",
    "moustafa-321",
    "mom#2026",
    "yassein@123"
];

let loggedIn = false;

function toggleSidebar(){
    document
        .getElementById("sidebar")
        .classList.toggle("active");
}

function validContainer(number){

    return /^[1-9][0-9]*$/.test(number);
}

function submitData(){

    const worker =
        document.getElementById("worker").value.trim();

    const container =
        document.getElementById("container").value.trim();

    const food =
        document.getElementById("food").value.trim();

    const refrigerationDate =
        document.getElementById("refrigerationDate").value;

    const executioner =
        document.getElementById("executioner").value.trim();

    const executionDate =
        document.getElementById("executionDate").value;

    if(
        worker === "" ||
        container === "" ||
        food === "" ||
        refrigerationDate === ""
    ){
        alert("يرجى تعبئة جميع الحقول المطلوبة");
        return;
    }

    if(!validContainer(container)){
        alert("رقم الحاوية يجب أن يبدأ من 1 ويحتوي على أرقام فقط");
        return;
    }

    let records =
        JSON.parse(
            localStorage.getItem("fridgeRecords")
        ) || [];

    records.push({

        worker: worker,

        container: container,

        food: food,

        refrigerationDate: refrigerationDate,
                executioner:
            executioner || "غير محدد",

        executionDate:
            executionDate || "غير محدد",

        createdAt:
            new Date().toLocaleString("ar-EG")
    });

    localStorage.setItem(
        "fridgeRecords",
        JSON.stringify(records)
    );

    alert("تم حفظ البيانات بنجاح");

    document.getElementById("worker").value = "";
    document.getElementById("container").value = "";
    document.getElementById("food").value = "";
    document.getElementById("refrigerationDate").value = "";
    document.getElementById("executioner").value = "";
    document.getElementById("executionDate").value = "";

    if(loggedIn){
        displayInbox();
    }
}

function login(){

    const password =
        document.getElementById("password").value;

    if(admins.includes(password)){

        loggedIn = true;

        document.getElementById("message").innerText =
            "Login Successful";

        document.getElementById("message").style.color =
            "green";

        displayInbox();

    }else{

        loggedIn = false;

        document.getElementById("message").innerText =
            "Wrong Password";

        document.getElementById("message").style.color =
            "red";
    }
}

function displayInbox(){

    const inbox =
        document.getElementById("inbox");

    const records =
        JSON.parse(
            localStorage.getItem("fridgeRecords")
        ) || [];

    inbox.innerHTML = "<h2>Admin Inbox</h2>";

    if(records.length === 0){

        inbox.innerHTML +=
            "<p>لا توجد سجلات.</p>";

        return;
    }

    records.forEach(function(record,index){

        inbox.innerHTML += `
            <div class="card">

                <strong>
                    سجل رقم ${index + 1}
                </strong>

                <br><br>

                <b>الموظف:</b>
                ${record.worker}

                <br>

                <b>رقم الحاوية:</b>
                ${record.container}

                <br>

                <b>نوع الطعام:</b>
                ${record.food}

                <br>

                <b>تاريخ التبريد:</b>
                ${record.refrigerationDate}

                <br>

                <b>منفذ الإعدام:</b>
                ${record.executioner}

                <br>

                <b>تاريخ الإعدام:</b>
                ${record.executionDate}

                <br>

                <b>وقت الإدخال:</b>
                ${record.createdAt}

            </div>
        `;
    });
}

function exportCSV(){

    const records =
        JSON.parse(
            localStorage.getItem("fridgeRecords")
        ) || [];

    if(records.length === 0){

        alert("لا توجد بيانات للتصدير");

        return;
    }

    let csv =
        "Employee,Container Number,Food Type,Refrigeration Date,Executioner,Execution Date,Entry Time\n";

    records.forEach(function(record){

        csv +=
            `"${record.worker}",` +
            `"${record.container}",` +
            `"${record.food}",` +
            `"${record.refrigerationDate}",` +
            `"${record.executioner}",` +
            `"${record.executionDate}",` +
            `"${record.createdAt}"\n`;
    });

    const blob =
        new Blob(
            [csv],
            {
                type:"text/csv;charset=utf-8;"
            }
        );

    const link =
        document.createElement("a");

    link.href =
        URL.createObjectURL(blob);

    link.download =
        "NewYorkGrill_Refrigerator_Records.csv";

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);
}

setInterval(function(){

    if(loggedIn){

        displayInbox();
    }

},2000);

</script>

</body>
</html>
