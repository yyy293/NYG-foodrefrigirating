<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New York Grill - نظام إدارة الثلاجة</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma, Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#8B0000;
    color:white;
    padding:20px;
    position:relative;
    text-align:center;
}

.logo{
    position:absolute;
    top:20px;
    right:20px;
    direction:ltr;
    font-size:30px;
    font-weight:bold;
}

.menu-btn{
    position:absolute;
    left:20px;
    top:20px;
    background:white;
    color:#8B0000;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.container{
    max-width:850px;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

button.submit-btn{
    width:100%;
    padding:15px;
    background:#8B0000;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button.submit-btn:hover{
    background:#a00000;
}

.sidebar{
    position:fixed;
    top:0;
    left:-380px;
    width:380px;
    height:100%;
    background:white;
    box-shadow:2px 0 10px rgba(0,0,0,0.3);
    overflow-y:auto;
    transition:0.3s;
    padding:20px;
    z-index:999;
}

.sidebar.active{
    left:0;
}

.close-btn{
    background:red;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:20px;
}

.inbox-item{
    background:#f5f5f5;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    border-right:5px solid #8B0000;
}

.login-btn{
    background:#8B0000;
    color:white;
    border:none;
    padding:12px;
    width:100%;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}
</style>
</head>

<body>

<header>
    <button class="menu-btn" onclick="toggleSidebar()">لوحة الإدارة</button>
    <div class="logo">New York Grill</div>
    <h1>نظام إدارة ثلاجة الطعام</h1>
</header>

<div class="container">

<h2>إضافة طعام جديد</h2>

<div class="form-group">
<label>اسم الموظف</label>
<input id="person">
</div>

<div class="form-group">
<label>رقم الحاوية</label>
<input id="container">
</div>

<div class="form-group">
<label>تاريخ التبريد</label>
<input type="date" id="coolDate">
</div>

<div class="form-group">
<label>تاريخ الإزالة</label>
<input type="date" id="removeDate">
</div>

<div class="form-group">
<label>نوع الطعام</label>
<input id="foodType">
</div>

<button class="submit-btn" onclick="submitFood()">إدخال</button>

</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<button class="close-btn" onclick="toggleSidebar()">إغلاق</button>

<h3>Admin Login</h3>

<input type="password" id="pass">
<button class="login-btn" onclick="login()">Login</button>

<div id="inbox"></div>

</div>

<script>
const admins = [
"admin-123",
"admin_321",
"admin@2026",
"admin#2026"
];

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
}

function submitFood(){

let person = document.getElementById("person").value;
let container = document.getElementById("container").value;
let cool = document.getElementById("coolDate").value;
let remove = document.getElementById("removeDate").value;
let type = document.getElementById("foodType").value;

if(!person || !container || !cool || !remove || !type){
alert("اكمل البيانات");
return;
}

// 🍽️ REAL REFRIGERATION ALGORITHM
let start = new Date(cool);
let end = new Date(remove);

let days = Math.round((end - start)/(1000*60*60*24));

let status =
days <= 2 ? "آمن" :
days <= 5 ? "قابل للاستخدام" :
"خطر / منتهي";

let record = {
person, container, cool, remove, type, days, status,
time: new Date().toLocaleString()
};

let data = JSON.parse(localStorage.getItem("fridge")) || [];
data.push(record);
localStorage.setItem("fridge", JSON.stringify(data));

alert("تم الإرسال ✔");
}

function login(){

let p = document.getElementById("pass").value;

if(!admins.includes(p)){
alert("Wrong password");
return;
}

loadInbox();
}

function loadInbox(){

let inbox = document.getElementById("inbox");
let data = JSON.parse(localStorage.getItem("fridge")) || [];

inbox.innerHTML = "<h3>Inbox</h3>";

data.forEach((r,i)=>{
inbox.innerHTML += `
<div class="inbox-item">
<b>#${i+1}</b><br>
الموظف: ${r.person}<br>
الحاوية: ${r.container}<br>
الطعام: ${r.type}<br>
الأيام: ${r.days}<br>
الحالة: ${r.status}<br>
وقت: ${r.time}
</div>`;
});
}
</script>

</body>
</html>
