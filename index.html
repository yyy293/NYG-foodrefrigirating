```javascript
const adminPasswords = [
    "admin-123",
    "admin_321",
    "admin@2026",
    "admin#2026"
];

function toggleSidebar() {
    document
        .getElementById("sidebar")
        .classList.toggle("active");
}

function submitFood() {

    const person =
        document.getElementById("person").value.trim();

    const container =
        document.getElementById("container").value.trim();

    const refrigerationDate =
        document.getElementById("refrigerationDate").value;

    const foodType =
        document.getElementById("foodType").value.trim();

    const eradicator =
        document.getElementById("eradicator").value.trim();

    const eradicationDate =
        document.getElementById("eradicationDate").value;

    if (
        person === "" ||
        container === "" ||
        refrigerationDate === "" ||
        foodType === ""
    ) {
        alert("يرجى تعبئة جميع الحقول المطلوبة.");
        return;
    }

    const foodRecord = {
        person: person,
        container: container,
        refrigerationDate: refrigerationDate,
        foodType: foodType,
        eradicator:
            eradicator || "لم يتم التخلص بعد",
        eradicationDate:
            eradicationDate || "غير محدد",

        createdAt:
            new Date().toLocaleString("ar-EG")
    };

    let records =
        JSON.parse(
            localStorage.getItem("foodRecords")
        ) || [];

    records.push(foodRecord);

    localStorage.setItem(
        "foodRecords",
        JSON.stringify(records)
    );

    document.getElementById(
        "successMessage"
    ).innerText =
        "تم حفظ البيانات بنجاح.";

    document.getElementById("person").value = "";
    document.getElementById("container").value = "";
    document.getElementById("refrigerationDate").value = "";
    document.getElementById("foodType").value = "";
    document.getElementById("eradicator").value = "";
    document.getElementById("eradicationDate").value = "";

    displayInbox();
}

function adminLogin() {

    const password =
        document.getElementById(
            "adminPassword"
        ).value;

    if (
        adminPasswords.includes(password)
    ) {

        document.getElementById(
            "loginMessage"
        ).innerText = "Login Successful";

        document.getElementById(
            "loginMessage"
        ).style.color = "green";

        document.getElementById(
            "loginSection"
        ).style.display = "none";

        document.getElementById(
            "adminSection"
        ).style.display = "block";

        displayInbox();

    } else {

        document.getElementById(
            "loginMessage"
        ).innerText = "Invalid Password";

        document.getElementById(
            "loginMessage"
        ).style.color = "red";
    }
}

function displayInbox() {

    const inbox =
        document.getElementById("inbox");

    const records =
        JSON.parse(
            localStorage.getItem("foodRecords")
        ) || [];

    inbox.innerHTML = "";

    if (records.length === 0) {

        inbox.innerHTML =
            "<p>لا توجد سجلات.</p>";

        return;
    }

    records.forEach(function(record, index) {

        inbox.innerHTML += `
            <div class="inbox-item">

                <strong>
                السجل رقم ${index + 1}
                </strong>

                <br><br>

                <b>الموظف:</b>
                ${record.person}

                <br>

                <b>رقم الحاوية:</b>
                ${record.container}

                <br>

                <b>تاريخ التبريد:</b>
                ${record.refrigerationDate}

                <br>

                <b>نوع الطعام:</b>
                ${record.foodType}

                <br>

                <b>المسؤول عن التخلص:</b>
                ${record.eradicator}

                <br>

                <b>تاريخ التخلص:</b>
                ${record.eradicationDate}

                <br>

                <b>وقت الإدخال:</b>
                ${record.createdAt}

            </div>
        `;
    });
}
