<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New York Grill - نظام التبريد</title>

<style>
body{
    margin:0;
    font-family:Tahoma;
    background:#f4f4f4;
}

header{
    background:#8B0000;
    color:white;
    padding:15px;
    text-align:center;
    position:relative;
}

.brand{
    position:absolute;
    right:10px;
    top:15px;
    font-size:18px;
    font-weight:bold;
    direction:ltr;
}

.menu-btn{
    position:absolute;
    left:10px;
    top:10px;
    background:white;
    color:#8B0000;
    border:none;
    padding:8px 10px;
    border-radius:6px;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:15px auto;
    background:white;
    padding:15px;
    border-radius:10px;
}

input{
    width:100%;
    padding:12px;
    margin:6px 0;
    font-size:16px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#8B0000;
    color:white;
    border:none;
    font-weight:bold;
    font-size:16px;
}

.sidebar{
    position:fixed;
    left:-100%;
    top:0;
    width:100%;
    height:100%;
    background:white;
    padding:15px;
    transition:0.3s;
    overflow-y:auto;
}

.sidebar.active{
    left:0;
}

.card{
    background:#f9fafb;
    padding:10px;
    margin:10px 0;
    border-right:5px solid #8B0000;
    border-radius:8px;
}

.safe{color:green;}
.warn{color:orange;}
.danger{color:red;}

#statusMsg{
    margin-top:10px;
    font-weight:bold;
}

#loginBox{
    overflow:hidden;
    transition:0.3s;
}
</style>
</head>

<body>

<header>
<button class="menu-btn" onclick="toggleSidebar()">Admin</button>
<div class="brand">New York Grill</div>
<h3>نظام التبريد الغذائي</h3>
</header>

<div class="container">

<h3>إدخال بيانات الطعام</h3>

<input id="worker" placeholder="اسم الموظف">

<!-- 0 → infinite numbers only -->
<input id="container" placeholder="رقم الحاوية (أرقام فقط)">

<input id="type" placeholder="نوع الطعام">
<input type="date" id="start">
<input type="date" id="end">

<h4>الإعدام (اختياري)</h4>

<input id="executioner" placeholder="اسم منفذ الإعدام">
<input type="date" id="execDate">

<button onclick="submitData()">إدخال</button>

</div>

<!-- SIDEBAR -->
<div class="sidebar" id="side">

<button onclick="toggleLoginBox()" style="width:100%;padding:10px;background:#8B0000;color:white;border:none;">
Admin Login ⬇
</button>

<div id="loginBox">

<h3>Admin Login</h3>

<input type="password" id="pass">
<button onclick="login()">Login</button>

<div id="statusMsg"></div>

</div>

<hr>

<div id="inbox"></div>

</div>

<script>

const admins = [
"admin-123",
"admin_321",
"admin@2026",
"admin#2026"
];

let loggedIn = false;
let loginOpen = true;

/* SIDEBAR */
function toggleSidebar(){
document.getElementById("side").classList.toggle("active");
}

/* COLLAPSE LOGIN */
function toggleLoginBox(){
let box = document.getElementById("loginBox");
loginOpen = !loginOpen;
box.style.display = loginOpen ? "block" : "none";
}

/* 🔢 0 → INFINITE VALIDATION */
function isValidContainer(v){
return /^[0-9]+$/.test(v);
}

/* RISK ENGINE */
function risk(days){
return days * 1.4;
}

/* SUBMIT */
function submitData(){

let worker = document.getElementById("worker").value;
let container = document.getElementById("container").value;
let type = document.getElementById("type").value;
let start = document.getElementById("start").value;
let end = document.getElementById("end").value;

let exec = document.getElementById("executioner").value;
let execDate = document.getElementById("execDate").value;

if(!worker || !container || !type || !start || !end){
alert("اكمل البيانات");
return;
}

/* MUST BE NUMBER ONLY */
if(!isValidContainer(container)){
alert("رقم الحاوية لازم يكون أرقام فقط (0 - ∞)");
return;
}

let days = Math.max(1,
Math.round((new Date(end)-new Date(start))/(1000*60*60*24))
);

let score = risk(days);

let status =
score < 3 ? "safe" :
score < 6 ? "warn" :
"danger";

let record = {
worker,
container,
type,
start,
end,
days,
score,
status,
executioner: exec || "لم يتم التنفيذ",
execDate: execDate || "لم يتم التنفيذ",
time: new Date().toLocaleString()
};

let data = JSON.parse(localStorage.getItem("fridge")) || [];
data.push(record);
localStorage.setItem("fridge", JSON.stringify(data));

alert("تم الإدخال ✔");
}

/* LOGIN */
function login(){

let p = document.getElementById("pass").value;

if(!admins.includes(p)){
document.getElementById("statusMsg").innerText = "Wrong password ❌";
document.getElementById("statusMsg").style.color = "red";
loggedIn = false;
return;
}

document.getElementById("statusMsg").innerText = "Login Successful ✔";
document.getElementById("statusMsg").style.color = "green";

loggedIn = true;
loadInbox();
}

/* INBOX */
function loadInbox(){

let inbox = document.getElementById("inbox");
let data = JSON.parse(localStorage.getItem("fridge")) || [];

if(!loggedIn){
inbox.innerHTML = "<p>Login required</p>";
return;
}

data.sort((a,b)=>b.score-a.score);

if(data.length === 0){
inbox.innerHTML = "<p>No data</p>";
return;
}

inbox.innerHTML = "<h3>Inbox</h3>";

data.forEach((r,i)=>{
inbox.innerHTML += `
<div class="card">
<b>#${i+1}</b><br>
Worker: ${r.worker}<br>
Container: ${r.container}<br>
Food: ${r.type}<br>
Days: ${r.days}<br>
Status: <b class="${r.status}">${r.status}</b><br>
Executioner: ${r.executioner}<br>
Execution Date: ${r.execDate}<br>
Time: ${r.time}
</div>
`;
});
}

/* AUTO REFRESH */
setInterval(()=>{
if(loggedIn) loadInbox();
},2000);

</script>

</body>
</html>
