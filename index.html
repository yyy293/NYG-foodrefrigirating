<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New York Grill - نظام التبريد</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma;
}

body{
    background:#f4f4f4;
}

/* HEADER */
header{
    background:#8B0000;
    color:white;
    padding:20px;
    text-align:center;
    position:relative;
}

.logo{
    position:absolute;
    right:20px;
    top:20px;
    font-size:26px;
    font-weight:bold;
    direction:ltr;
}

.menu-btn{
    position:absolute;
    left:20px;
    top:20px;
    background:white;
    color:#8B0000;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

/* MAIN */
.container{
    max-width:850px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:12px;
}

/* INPUTS */
input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button.submit{
    width:100%;
    padding:12px;
    background:#8B0000;
    color:white;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    left:-400px;
    top:0;
    width:400px;
    height:100%;
    background:white;
    padding:15px;
    box-shadow:2px 0 10px rgba(0,0,0,0.2);
    transition:0.3s;
}

.sidebar.active{
    left:0;
}

.card{
    background:#f9fafb;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border-right:5px solid #8B0000;
}

.safe{color:green;}
.warn{color:orange;}
.danger{color:red;}

#loginMsg{
    margin-top:10px;
    font-weight:bold;
}
#status{
    margin-top:5px;
    color:green;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
<button class="menu-btn" onclick="toggle()">Admin</button>
<div class="logo">New York Grill</div>
<h2>نظام إدارة التبريد الغذائي</h2>
</header>

<div class="container">

<h3>إدخال بيانات الطعام</h3>

<input id="worker" placeholder="اسم الموظف">
<input id="container" placeholder="رقم الحاوية">
<input type="number" id="temp" placeholder="درجة الحرارة °C">
<input type="date" id="start">
<input type="date" id="end">
<input id="type" placeholder="نوع الطعام">

<button class="submit" onclick="submitData()">إدخال</button>

</div>

<!-- SIDEBAR -->
<div class="sidebar" id="side">

<h3>Admin Login</h3>

<input type="password" id="pass">
<button onclick="login()">Login</button>

<div id="loginMsg"></div>
<div id="status"></div>

<hr>

<div id="inbox"></div>

</div>

<script>

const admins = [
"admin-123",
"admin_321",
"admin@2026",
"admin#2026"
];

function toggle(){
document.getElementById("side").classList.toggle("active");
}

/* 🔥 REAL REFRIGERATION RISK ALGORITHM */
function calcRisk(days, temp){

let tempPenalty = 0;

if(temp > 5) tempPenalty = 2;
if(temp > 10) tempPenalty = 4;

return (days * 1.3) + tempPenalty;
}

/* SUBMIT (WORKER SIDE) */
function submitData(){

let w = document.getElementById("worker").value;
let c = document.getElementById("container").value;
let t = parseFloat(document.getElementById("temp").value);
let s = document.getElementById("start").value;
let e = document.getElementById("end").value;
let type = document.getElementById("type").value;

if(!w || !c || !t || !s || !e || !type){
alert("اكمل البيانات");
return;
}

let days = Math.max(1,
Math.round((new Date(e)-new Date(s))/(1000*60*60*24))
);

let risk = calcRisk(days, t);

let status =
risk < 3 ? "safe" :
risk < 6 ? "warn" :
"danger";

let record = {
w,c,t,s,e,type,days,risk,status,
time:new Date().toLocaleString()
};

let data = JSON.parse(localStorage.getItem("fridge")) || [];
data.push(record);
localStorage.setItem("fridge", JSON.stringify(data));

alert("تم الإرسال ✔");
}

/* 🔐 FIXED LOGIN */
function login(){

let p = document.getElementById("pass").value;

let msg = document.getElementById("loginMsg");
let status = document.getElementById("status");

if(admins.includes(p)){

msg.style.color = "green";
msg.innerText = "Login Successful ✔";

status.innerText = "Admin Mode Active";

loadInbox();

} else {

msg.style.color = "red";
msg.innerText = "Wrong Password ❌";

status.innerText = "";
}
}

/* 📦 INBOX */
function loadInbox(){

let inbox = document.getElementById("inbox");
let data = JSON.parse(localStorage.getItem("fridge")) || [];

data.sort((a,b)=>b.risk-a.risk);

inbox.innerHTML = "<h3>Inbox</h3>";

data.forEach((r,i)=>{

inbox.innerHTML += `
<div class="card">
<b>#${i+1}</b><br>
Worker: ${r.w}<br>
Container: ${r.c}<br>
Food: ${r.type}<br>
Days: ${r.days}<br>
Temp: ${r.t}°C<br>
Risk: <b class="${r.status}">${r.status}</b><br>
Time: ${r.time}
</div>
`;

});

if(data.length === 0){
inbox.innerHTML += "<p>No records yet</p>";
}
}

</script>

</body>
</html>
