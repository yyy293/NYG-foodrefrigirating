<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New York Grill - نظام التبريد</title>

<style>
body{
    margin:0;
    font-family:Tahoma;
    background:#f4f4f4;
}

header{
    background:#8B0000;
    color:white;
    padding:20px;
    position:relative;
    text-align:center;
}

.brand{
    position:absolute;
    right:20px;
    top:20px;
    font-size:26px;
    font-weight:bold;
    direction:ltr;
}

.btn{
    position:absolute;
    left:20px;
    top:20px;
    background:white;
    color:#8B0000;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.container{
    max-width:850px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:12px;
}

input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#8B0000;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

.sidebar{
    position:fixed;
    left:-400px;
    top:0;
    width:400px;
    height:100%;
    background:white;
    padding:15px;
    transition:0.3s;
    box-shadow:2px 0 10px rgba(0,0,0,0.2);
}

.sidebar.active{
    left:0;
}

.card{
    background:#f9fafb;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border-right:5px solid #8B0000;
}

.safe{color:green;}
.warn{color:orange;}
.danger{color:red;}
</style>
</head>

<body>

<header>
<button class="btn" onclick="toggle()">Admin</button>
<div class="brand">New York Grill</div>
<h2>نظام التبريد الغذائي</h2>
</header>

<div class="container">

<h3>إدخال بيانات الطعام</h3>

<input id="worker" placeholder="اسم الموظف">

<!-- ONLY NUMBERS ALLOWED -->
<input id="container" type="number" placeholder="رقم الحاوية">

<input id="type" placeholder="نوع الطعام">
<input type="date" id="start">
<input type="date" id="end">

<hr>

<h4>بيانات الإعدام (اختياري)</h4>

<input id="executioner" placeholder="اسم منفذ الإعدام">
<input type="date" id="execDate">

<button onclick="submit()">إدخال</button>

</div>

<!-- SIDEBAR -->
<div class="sidebar" id="side">

<h3>Admin Login</h3>

<input type="password" id="pass">
<button onclick="login()">Login</button>

<div id="msg"></div>

<hr>

<div id="inbox"></div>

</div>

<script>

const admins = [
"admin-123",
"admin_321",
"admin@2026",
"admin#2026"
];

function toggle(){
document.getElementById("side").classList.toggle("active");
}

/* VALIDATION: ONLY NUMBERS FOR CONTAINER */
function isValidContainer(value){
return /^[0-9]+$/.test(value);
}

/* LOGIC */
function calcRisk(days){
return days * 1.5;
}

function submit(){

let worker = document.getElementById("worker").value;
let container = document.getElementById("container").value;
let type = document.getElementById("type").value;
let start = document.getElementById("start").value;
let end = document.getElementById("end").value;

let exec = document.getElementById("executioner").value;
let execDate = document.getElementById("execDate").value;

/* REQUIRED CHECK */
if(!worker || !container || !type || !start || !end){
alert("اكمل البيانات المطلوبة");
return;
}

/* CONTAINER VALIDATION */
if(!isValidContainer(container)){
alert("رقم الحاوية لازم يكون أرقام فقط");
return;
}

let days = Math.max(1,
Math.round((new Date(end)-new Date(start))/(1000*60*60*24))
);

let risk = calcRisk(days);

let status =
risk < 3 ? "safe" :
risk < 6 ? "warn" :
"danger";

let record = {
worker,
container,
type,
start,
end,
days,
risk,
status,
executioner: exec || "لم يتم التنفيذ",
execDate: execDate || "لم يتم التنفيذ",
time: new Date().toLocaleString()
};

let data = JSON.parse(localStorage.getItem("fridge")) || [];
data.push(record);
localStorage.setItem("fridge", JSON.stringify(data));

alert("تم الإدخال ✔");
}

/* LOGIN FIXED */
function login(){

let p = document.getElementById("pass").value;

if(!admins.includes(p)){
document.getElementById("msg").innerText = "Wrong password ❌";
document.getElementById("msg").style.color = "red";
return;
}

document.getElementById("msg").innerText = "Login Successful ✔";
document.getElementById("msg").style.color = "green";

loadInbox();
}

/* INBOX */
function loadInbox(){

let inbox = document.getElementById("inbox");
let data = JSON.parse(localStorage.getItem("fridge")) || [];

data.sort((a,b)=>b.risk-a.risk);

inbox.innerHTML = "<h3>Inbox</h3>";

if(data.length === 0){
inbox.innerHTML += "<p>لا يوجد بيانات</p>";
return;
}

data.forEach((r,i)=>{
inbox.innerHTML += `
<div class="card">
<b>#${i+1}</b><br>
الموظف: ${r.worker}<br>
الحاوية: ${r.container}<br>
الطعام: ${r.type}<br>
الأيام: ${r.days}<br>
الحالة: <b class="${r.status}">${r.status}</b><br>
منفذ الإعدام: ${r.executioner}<br>
تاريخ الإعدام: ${r.execDate}<br>
الوقت: ${r.time}
</div>
`;
});
}

</script>

</body>
</html>
