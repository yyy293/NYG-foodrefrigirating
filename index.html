<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>New York Grill - نظام إدارة الثلاجة</title>
<style>
body{font-family:Tahoma;margin:0;background:#f4f4f4}
header{background:#8B0000;color:#fff;padding:20px;position:relative;text-align:center}
.logo{position:absolute;right:20px;top:20px;direction:ltr;font-size:28px;font-weight:bold}
.menu{position:absolute;left:20px;top:20px;padding:10px;border:none;border-radius:8px}
.container,.sidebar{background:#fff;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,.15)}
.container{max-width:800px;margin:30px auto;padding:25px}
label{display:block;margin:12px 0 5px}
input{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px}
button{cursor:pointer}
.submit{width:100%;padding:12px;background:#8B0000;color:#fff;border:none;border-radius:8px;margin-top:15px}
.sidebar{position:fixed;left:-380px;top:0;width:360px;height:100%;overflow:auto;padding:20px;transition:.3s}
.sidebar.active{left:0}
.item{background:#f7f7f7;padding:10px;margin:10px 0;border-right:4px solid #8B0000}
.admin{display:none}
.small{padding:8px 10px;margin:5px;border:none;border-radius:6px}
</style>
</head>
<body>
<header>
<button class="menu" onclick="toggleSidebar()">لوحة الإدارة</button>
<div class="logo">New York Grill</div>
<h1>نظام إدارة ثلاجة الطعام</h1>
</header>

<div class="container">
<h2>إضافة طعام جديد</h2>

<label>اسم الشخص الذي قام بتغليف ووضع الطعام في الثلاجة</label>
<input id="person">

<label>رقم الحاوية</label>
<input id="container" type="number">

<label>تاريخ التبريد</label>
<input id="refrigerationDate" type="date">

<label>نوع الطعام</label>
<input id="foodType">

<label>الشخص المسؤول عن التخلص من الطعام (اختياري)</label>
<input id="eradicator">

<label>تاريخ التخلص (اختياري)</label>
<input id="eradicationDate" type="date">

<button class="submit" onclick="submitFood()">إدخال</button>
<p id="msg"></p>
</div>

<div class="sidebar" id="sidebar">
<button class="small" onclick="toggleSidebar()">إغلاق</button>

<div id="loginSection">
<h3>Admin Login</h3>
<input id="adminPassword" type="password" placeholder="Password">
<button class="submit" onclick="adminLogin()">Login</button>
<p id="loginMsg"></p>
</div>

<div class="admin" id="adminSection">
<h3>Admin Inbox</h3>
<button class="small" onclick="downloadCSV()">Download Excel</button>
<div id="inbox"></div>
</div>
</div>

<script>
const passwords=["admin-123","admin_321","admin@2026","admin#2026"];

function toggleSidebar(){
 document.getElementById("sidebar").classList.toggle("active");
}

function submitFood(){
 const person=personEl.value.trim();
 const container=containerEl.value.trim();
 const refrigerationDate=refrigerationDateEl.value;
 const foodType=foodTypeEl.value.trim();

 if(!person||!container||!refrigerationDate||!foodType){
   alert("يرجى تعبئة جميع الحقول المطلوبة");
   return;
 }

 let records=JSON.parse(localStorage.getItem("foodRecords")||"[]");

 records.push({
  person,
  container,
  refrigerationDate,
  foodType,
  eradicator:eradicatorEl.value.trim()||"لم يتم التخلص بعد",
  eradicationDate:eradicationDateEl.value||"غير محدد",
  createdAt:new Date().toLocaleString("ar-EG")
 });

 localStorage.setItem("foodRecords",JSON.stringify(records));

 document.getElementById("msg").innerText="تم حفظ البيانات بنجاح";

 document.querySelectorAll(".container input").forEach(i=>i.value="");
 displayInbox();
}

function adminLogin(){
 const p=document.getElementById("adminPassword").value;
 if(passwords.includes(p)){
   loginSection.style.display="none";
   adminSection.style.display="block";
   loginMsg.innerText="Login Successful";
   displayInbox();
 }else{
   loginMsg.innerText="Invalid Password";
 }
}

function displayInbox(){
 const inbox=document.getElementById("inbox");
 const records=JSON.parse(localStorage.getItem("foodRecords")||"[]");
 inbox.innerHTML="";
 records.forEach((r,i)=>{
  inbox.innerHTML+=`
   <div class="item">
   <b>السجل ${i+1}</b><br>
   الموظف: ${r.person}<br>
   الحاوية: ${r.container}<br>
   تاريخ التبريد: ${r.refrigerationDate}<br>
   نوع الطعام: ${r.foodType}<br>
   المسؤول عن التخلص: ${r.eradicator}<br>
   تاريخ التخلص: ${r.eradicationDate}<br>
   وقت الإدخال: ${r.createdAt}
   </div>`;
 });
}

function downloadCSV(){
 const records=JSON.parse(localStorage.getItem("foodRecords")||"[]");
 if(records.length===0){alert("لا توجد بيانات");return;}
 let csv="الموظف,الحاوية,تاريخ التبريد,نوع الطعام,المسؤول عن التخلص,تاريخ التخلص,وقت الإدخال\n";
 records.forEach(r=>{
   csv+=`"${r.person}","${r.container}","${r.refrigerationDate}","${r.foodType}","${r.eradicator}","${r.eradicationDate}","${r.createdAt}"\n`;
 });
 const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"});
 const link=document.createElement("a");
 link.href=URL.createObjectURL(blob);
 link.download="food_records.csv";
 link.click();
}

const personEl=document.getElementById("person");
const containerEl=document.getElementById("container");
const refrigerationDateEl=document.getElementById("refrigerationDate");
const foodTypeEl=document.getElementById("foodType");
const eradicatorEl=document.getElementById("eradicator");
const eradicationDateEl=document.getElementById("eradicationDate");

displayInbox();
</script>
</body>
</html>
